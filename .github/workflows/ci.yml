name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      cursor_autofix:
        description: "Start a Cursor Cloud Agent if CI fails"
        required: false
        type: boolean
        default: false

# Separate groups per event so a PR synchronize does not cancel the push run
# (and vice versa), which previously showed "cancelled" and a red commit status.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      CI: "true"
      SENTRY_ENABLED: "false"
      NEXT_PUBLIC_CONVEX_URL: "https://ci-placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktcGxhY2Vob2xkZXIkY2k"
      CLERK_SECRET_KEY: "sk_test_ci-placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  # Always run after test-and-build so the check is green when we skip the agent.
  # A skipped job fails required status checks; a successful no-op does not.
  cursor-autofix:
    name: Cursor autofix
    runs-on: ubuntu-latest
    needs: test-and-build
    if: always()
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate autofix eligibility
        id: autofix
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_RESULT: ${{ needs.test-and-build.result }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url || '' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          CURSOR_AUTOFIX_INPUT: ${{ inputs.cursor_autofix }}
        run: |
          set -euo pipefail
          pr_url="${PR_HTML_URL}"

          if [ "$TEST_RESULT" != "failure" ]; then
            echo "run_autofix=false" >> "$GITHUB_OUTPUT"
            echo "pr_url<<EOF" >> "$GITHUB_OUTPUT"
            echo "$pr_url" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$REF_NAME" == cursor/* ]]; then
            echo "run_autofix=false" >> "$GITHUB_OUTPUT"
            echo "pr_url<<EOF" >> "$GITHUB_OUTPUT"
            echo "$pr_url" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_autofix=false
          case "$EVENT_NAME" in
            pull_request)
              if [ "$PR_HEAD_REPO" = "$REPOSITORY" ]; then
                run_autofix=true
              fi
              ;;
            workflow_dispatch)
              if [ "$CURSOR_AUTOFIX_INPUT" = "true" ]; then
                run_autofix=true
              fi
              ;;
            push)
              owner="${REPOSITORY%%/*}"
              head_filter="${owner}:${REF_NAME}"
              open_count=$(gh pr list --repo "$REPOSITORY" --head "$head_filter" --state open --json number --jq 'length')
              if [ "$open_count" != "0" ]; then
                # pull_request workflow for the same branch will run autofix with a real PR_URL
                run_autofix=false
              else
                run_autofix=true
                pr_url=""
              fi
              ;;
          esac

          echo "run_autofix=$run_autofix" >> "$GITHUB_OUTPUT"
          echo "pr_url<<EOF" >> "$GITHUB_OUTPUT"
          echo "$pr_url" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Skip autofix (not applicable)
        if: always() && steps.autofix.outputs.run_autofix != 'true'
        run: |
          echo "Cursor autofix skipped (tests passed, job was not a failure, or this event/branch is not eligible)."

      - name: Setup Bun
        if: always() && steps.autofix.outputs.run_autofix == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        if: always() && steps.autofix.outputs.run_autofix == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        if: always() && steps.autofix.outputs.run_autofix == 'true'
        run: bun install --frozen-lockfile

      - name: Start Cursor Cloud Agent
        if: always() && steps.autofix.outputs.run_autofix == 'true'
        run: bun .github/scripts/cursor-autofix.ts
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2' }}
          PR_URL: ${{ steps.autofix.outputs.pr_url }}
