name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Separate groups per event so a PR synchronize does not cancel the push run
# (and vice versa), which previously showed "cancelled" and a red commit status.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      CI: "true"
      SENTRY_ENABLED: "false"
      NEXT_PUBLIC_CONVEX_URL: "https://ci-placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktcGxhY2Vob2xkZXIkY2k"
      CLERK_SECRET_KEY: "sk_test_ci-placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  cursor-autofix:
    needs: [test-and-build]
    if: >-
      ${{
        always() &&
        needs.test-and-build.result == 'failure' &&
        !startsWith(github.head_ref || github.ref_name, 'cursor/') &&
        (
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    permissions:
      contents: read
      pull-requests: read
    uses: wrowston/ci-autofix/.github/workflows/cursor-autofix.yml@main
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
    with:
      workflows: CI
      workflow_name: ${{ github.workflow }}
      # Avoid calling the Cursor API when CI already succeeded; ci-autofix's "Start Cursor
      # Cloud Agent" step exits non-zero immediately on some setups and turns green builds red.
      # Dry-run prints the prompt only and still satisfies a required autofix job.
      dry_run: ${{ needs.test-and-build.result == 'success' }}
      pr_url: ${{ github.event.pull_request.html_url || '' }}
      # Cursor Cloud Agent expects a branch/ref name here; passing a commit SHA makes
      # createCloudAgent fail with "Branch '<sha>' does not exist".
      ref: ${{ github.head_ref || github.ref_name }}
      branch: ${{ github.head_ref || github.ref_name }}
