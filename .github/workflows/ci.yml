name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      cursor_autofix:
        description: "Start a Cursor Cloud Agent if CI fails"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      CI: "true"
      SENTRY_ENABLED: "false"
      NEXT_PUBLIC_CONVEX_URL: "https://ci-placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktcGxhY2Vob2xkZXIkY2k"
      CLERK_SECRET_KEY: "sk_test_ci-placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  cursor-autofix:
    name: Cursor autofix
    runs-on: ubuntu-latest
    needs: test-and-build
    if: >-
      ${{
        failure() &&
        needs.test-and-build.result == 'failure' &&
        !startsWith(github.head_ref || github.ref_name, 'cursor/') &&
        (
          github.event_name == 'push' ||
          (
            github.event_name == 'workflow_dispatch' &&
            inputs.cursor_autofix
          ) ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          )
        )
      }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Cursor Cloud Agent
        run: bun .github/scripts/cursor-autofix.ts
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
