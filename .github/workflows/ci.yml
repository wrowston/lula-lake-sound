name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Separate groups per event so a PR synchronize does not cancel the push run
# (and vice versa), which previously showed "cancelled" and a red commit status.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest

    env:
      CI: "true"
      SENTRY_ENABLED: "false"
      NEXT_PUBLIC_CONVEX_URL: "https://ci-placeholder.convex.cloud"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktcGxhY2Vob2xkZXIkY2k"
      CLERK_SECRET_KEY: "sk_test_ci-placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  cursor-autofix:
    needs: [test-and-build]
    if: ${{ failure() }}
    permissions:
      contents: read
      pull-requests: read
    uses: wrowston/ci-autofix/.github/workflows/cursor-autofix.yml@main
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
